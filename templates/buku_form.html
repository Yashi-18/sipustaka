{% extends 'base.html' %}
{% block content %}

<div class="mb-8">

    <p class="text-sm text-gray-500">
        Kelola Buku
    </p>

    <div class="flex items-center gap-3">

        <a href="{% url 'buku_list' %}"
           class="text-gray-500 hover:text-gray-700">

            <span class="material-icons-outlined">
                arrow_back
            </span>

        </a>

        <h2 class="text-3xl font-bold text-gray-900">

            {% if buku %}
                Edit Buku
            {% else %}
                Tambah Buku
            {% endif %}

        </h2>

    </div>

</div>

<div class="bg-white rounded-[28px] p-8 shadow-sm max-w-5xl">

    <form method="POST">

        {% csrf_token %}

        <div class="grid md:grid-cols-2 gap-6">

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Judul Buku
                </label>

                <input
                    type="text"
                    name="judul"
                    value="{{ buku.judul }}"
                    required
                    class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Pengarang
                </label>

                <input
                    type="text"
                    name="pengarang"
                    value="{{ buku.pengarang }}"
                    required
                    class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Kategori
                </label>

                <select
                    name="kategori"
                    required
                    class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

                    <option value="Novel" {% if buku.kategori == 'Novel' %}selected{% endif %}>
                        Novel
                    </option>

                    <option value="Sejarah" {% if buku.kategori == 'Sejarah' %}selected{% endif %}>
                        Sejarah
                    </option>

                    <option value="Pendidikan" {% if buku.kategori == 'Pendidikan' %}selected{% endif %}>
                        Pendidikan
                    </option>

                </select>

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Penerbit
                </label>

                <input
                    type="text"
                    name="penerbit"
                    value="{{ buku.penerbit }}"
                    required
                    class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Tahun Terbit
                </label>

                <input
                    type="number"
                    name="tahun_terbit"
                    value="{{ buku.tahun_terbit }}"
                    required
                    class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Rak
                </label>

                <select
                    name="rak"
                    required
                    class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

                    <option value="Rak A-01" {% if buku.rak == 'Rak A-01' %}selected{% endif %}>
                        Rak A-01
                    </option>

                    <option value="Rak A-02" {% if buku.rak == 'Rak A-02' %}selected{% endif %}>
                        Rak A-02
                    </option>

                    <option value="Rak A-03" {% if buku.rak == 'Rak A-03' %}selected{% endif %}>
                        Rak A-03
                    </option>

                </select>

            </div>

        </div>

        <div class="mt-6">

            <label class="block text-sm font-medium text-gray-700 mb-2">
                Stok Buku
            </label>

            <input
                type="number"
                name="stok"
                value="{{ buku.stok }}"
                required
                class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
            >

        </div>

        <div class="mt-6">

            <label class="block text-sm font-medium text-gray-700 mb-2">
                Deskripsi
            </label>

            <textarea
                name="deskripsi"
                rows="5"
                required
                class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
            >{{ buku.deskripsi }}</textarea>

        </div>

        <div class="flex gap-3 mt-8">

            <button
                type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-medium transition"
            >

                <span class="material-icons-outlined align-middle text-[18px]">
                    save
                </span>

                Simpan

            </button>

            <a
                href="{% url 'buku_list' %}"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-3 rounded-2xl font-medium transition"
            >

                Batal

            </a>

        </div>

    </form>

</div>

{% endblock %}
