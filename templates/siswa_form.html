{% extends 'base.html' %}
{% block content %}

<div class="mb-8">

    <p class="text-sm text-gray-500">
        Kelola Siswa
    </p>

    <div class="flex items-center gap-3">

        <a href="{% url 'siswa_list' %}"
           class="text-gray-500 hover:text-gray-700">

            <span class="material-icons-outlined">
                arrow_back
            </span>

        </a>

        <h2 class="text-3xl font-bold text-gray-900">

            {% if siswa %}
                Edit Siswa
            {% else %}
                Tambah Siswa
            {% endif %}

        </h2>

    </div>

</div>

<div class="bg-white rounded-[28px] p-8 shadow-sm max-w-4xl">

    <form method="POST">

        {% csrf_token %}

        <div class="grid md:grid-cols-2 gap-6">

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Nama Lengkap
                </label>

                <input
                    type="text"
                    name="nama"
                    value="{{ siswa.nama }}"
                    required
                    class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Kelas
                </label>

                <input
                    type="text"
                    name="kelas"
                    value="{{ siswa.kelas }}"
                    required
                    class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    NIS
                </label>

                <input
                    type="text"
                    name="nis"
                    value="{{ siswa.nis }}"
                    required
                    class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Status
                </label>

                <select
                    name="is_active"
                    class="w-full rounded-2xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

                    <option value="True"
                        {% if siswa.is_active == True %}
                        selected
                        {% endif %}
                    >
                        Aktif
                    </option>

                    <option value="False"
                        {% if siswa.is_active == False %}
                        selected
                        {% endif %}
                    >
                        Tidak Aktif
                    </option>

                </select>

            </div>

        </div>

        <div class="flex gap-3 mt-8">

            <button
                type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-medium transition"
            >

                <span class="material-icons-outlined align-middle text-[18px]">
                    save
                </span>

                Simpan

            </button>

            <a
                href="{% url 'siswa_list' %}"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-3 rounded-2xl font-medium transition"
            >

                Batal

            </a>

        </div>

    </form>

</div>

{% endblock %}
